database:
  dsn: "${MIMIC_IV_DATABASE_DSN:-postgresql://mimiciv:mimiciv@127.0.0.1:5435/mimiciv}"
  schema_allowlist: ["mimiciv_hosp", "mimiciv_icu"]
  readonly_role: "rlvr_reader"
  statement_timeout_ms: 60000
  lock_timeout_ms: 1000
  idle_tx_timeout_ms: 60000
  solver_pool_size: 32
  control_pool_size: 8

domain:
  name: "healthcare_operations"
  language: "ko"
  scenario_description: "an end user asking a healthcare organization for factual information from their records"

providers:
  codex_oauth:
    type: "openai_compatible"
    base_url: "http://127.0.0.1:10531/v1"
    api_key_env: "OPENAI_API_KEY"
    max_concurrency: 16
    timeout_s: 120
  local_server:
    type: "openai_compatible"
    base_url: "${LOCAL_OPENAI_BASE_URL:-http://127.0.0.1:8000/v1}"
    api_key_env: "LOCAL_OPENAI_API_KEY"
    max_concurrency: 16
    timeout_s: 120
  anthropic_main:
    type: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"
    max_concurrency: 8
    timeout_s: 120
  opencode_zen:
    type: "openai_compatible"
    base_url: "https://opencode.ai/zen/v1"
    api_key_env: "OPENCODE_API_KEY"
    max_concurrency: 8
    timeout_s: 180
    max_retries: 5
  openrouter:
    type: "openai_compatible"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    max_concurrency: 8
    timeout_s: 180
    max_retries: 3

models:
  composer:
    provider: "openrouter"
    model: "openai/gpt-5.4-nano"
  solvers:
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}
    - {provider: "openrouter", model: "openai/gpt-5.4-nano"}

provider_resilience:
  circuit_breaker_window_s: 60
  circuit_breaker_threshold: 0.3
  probe_interval_s: 30
  minimum_request_count: 2
  release_semaphore_on_backoff: true

atomic_tools:
  max_tools: 300
  bounded_result_limit: 100
  max_batch_values: 128
  float_precision: 2

synthesis:
  runtime:
    max_turns: 30
    trial_timeout_s: 300
    run_timeout_s: 300
    tracing: true
    sdk_sessions_enabled: false
    anchor_candidates_enabled: true
    anchor_candidate_limit: 10
    max_generation_attempts: 5
    max_consecutive_category_discards: 3
    category_backoff_duration_s: 3600
    schema_summary_max_tables: 32
    prompt_schema_orientation_max_tables: 8
    prompt_schema_orientation_max_columns: 8
    label_preview_field_limit: 8
    diagnostic_item_limit: 5
    recent_tool_call_limit: 20
    payload_preview_max_string_length: 400
    payload_preview_max_list_items: 3
    payload_preview_max_dict_items: 6
  parallel_workers: 2
  coverage_planner:
    target_count_per_band: 3

solver_runtime:
  max_turns: 16
  max_episode_duration_ms: 120000
  tracing: true
  sdk_sessions_enabled: true

calibration:
  lower_pass_rate: 0.5
  upper_pass_rate: 0.9
  ci_alpha: 0.1
  solver_batch_size: 4
  max_solver_runs: 20
  safe_early_termination: true

dedup:
  exact_enabled: true
  near_dup_enabled: true
  minhash_threshold: 0.9

task_registry:
  minhash_num_perm: 128
  default_query_limit: 20
  semantic_shingle_size: 3

budget:
  max_run_usd: 250.0
  max_gpu_hours: null
  compose_phase_usd: 40.0
  solve_phase_usd: 180.0
  min_accept_rate_attempts: 10
  reserve_strategy: "phase_specific"

visibility:
  default_visibility: "user_visible"
  visibility_overrides:
    subject_id: "blocked"
    hadm_id: "blocked"
    stay_id: "blocked"
    itemid: "blocked"
    caregiver_id: "blocked"
    provider_id: "blocked"
    poe_id: "blocked"
    pharmacy_id: "blocked"
    specimen_id: "blocked"
    micro_specimen_id: "blocked"
    order_provider_id: "blocked"
    enter_provider_id: "blocked"

output:
  run_db_path: "./artifacts/mimiciv/run.db"
  traces_dir: "./artifacts/mimiciv/traces"
