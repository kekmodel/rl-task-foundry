database:
  dsn: "${DATABASE_DSN:-postgresql://sakila:sakila@127.0.0.1:5433/sakila}"
  schema_allowlist: ["public"]
  readonly_role: "rlvr_reader"
  statement_timeout_ms: 5000
  lock_timeout_ms: 1000
  idle_tx_timeout_ms: 5000
  solver_pool_size: 32
  control_pool_size: 8

domain:
  name: "service_operations"
  language: "ko"
  scenario_description: "an end user asking the organization that owns the database for help or information"

providers:
  codex_oauth:
    type: "openai_compatible"
    base_url: "http://127.0.0.1:10531/v1"
    api_key_env: "OPENAI_API_KEY"
    max_concurrency: 16
    timeout_s: 120
  local_server:
    type: "openai_compatible"
    base_url: "${LOCAL_OPENAI_BASE_URL:-http://127.0.0.1:8000/v1}"
    api_key_env: "LOCAL_OPENAI_API_KEY"
    max_concurrency: 16
    timeout_s: 120
  anthropic_main:
    type: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"
    max_concurrency: 8
    timeout_s: 120

models:
  composer:
    provider: "codex_oauth"
    model: "gpt-5.4-mini"
  solvers:
    - solver_id: "gpt54m_00"
      backend: "openai_agents"
      provider: "codex_oauth"
      model: "gpt-5.4-mini"
      memory_mode: "none"
      summarization_mode: "off"
