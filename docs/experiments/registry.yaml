        - command: "uv run rl-task-foundry run-real-db-trial pagila artifacts/experiments/N0002/trials/pagila_trial_007_max_attempts3_repair_boundary"
          artifact: "artifacts/experiments/N0002/trials/pagila_trial_007_max_attempts3_repair_boundary/debug/analysis.jsonl"
          status: "synthesis_failed"
          elapsed_seconds: 266.477
          observation: "max_generation_attempts=3 converted a long Kimi repair loop into bounded discard; last feedback was answer_contract_evidence_mismatch plus label_changed_during_repair."
          decision_use: "diagnostic only; not an aggregate quality metric"
      previous_harvest:
        command: "uv run rl-task-foundry harvest pagila artifacts/experiments/N0002/harvest/pagila_target3_kimi_submit_normalization --target 3 --productive-budget-min 15 --workers 1"
        artifact: "artifacts/experiments/N0002/harvest/pagila_target3_kimi_submit_normalization/analysis.jsonl"
        committed: 0
        attempted: 3
        productive_elapsed_seconds: 900.0
        provider_issue_trials: 0
        production_viability_passed: false
        notable_failure: "three submit_payload_invalid rejections at the FunctionTool boundary"
      harvest:
        command: "uv run rl-task-foundry harvest pagila artifacts/experiments/N0002/harvest/pagila_target3_repair_boundary_attempts3 --target 3 --productive-budget-min 15 --workers 3"
        artifact: "artifacts/experiments/N0002/harvest/pagila_target3_repair_boundary_attempts3/analysis.jsonl"
        db_id: pagila
        target_committed: 3
        committed: 1
        attempted: 6
        elapsed_seconds: 519.9
        productive_elapsed_seconds: 1087.8
        productive_budget_seconds: 900.0
        productive_seconds_per_accepted: 1087.8
        provider_issue_trials: 0
        provider_issue_elapsed_seconds: 0.0
        production_viability_passed: false
        productive_budget_exceeded: true
        accepted_task_ids:
          - "task_Film Category Lookup_96af33b8b00279c2"
        trial_failures:
          TrialWallClockTimeout: 2
          SynthesisArtifactGenerationError: 1
        submit_draft_feedback:
          answer_contract_phrase_missing: 4
          answer_contract_binding_missing: 3
          answer_contract_list_limit_too_wide: 1
        submit_draft_rejections:
          calibration_inconclusive: 1
          submit_payload_invalid: 0
        dqs_review:
          reviewer: "builder local qualitative review; independent evaluator not run"
          accepted_low_quality: 0
          samples:
            - task_id: "task_Film Category Lookup_96af33b8b00279c2"
              label: ACCEPTED_BORDERLINE
              rationale: "Evidence and label are aligned, solver pass_rate=0.875 with 7/8 matched runs, and the hidden entity handle is valid under the current pipeline contract. The task is still a weak current-entity category lookup with limited reasoning value, so it is not strong promotion evidence."
          diversity_score: "not_scored_single_accepted"
          independent_report: "not_run_not_promotion_candidate"
      trial_notes:
        - "The latest harvest had no submit_payload_invalid rejections, so the Kimi transport/tool-call issue is addressed for the observed path."
        - "The remaining harvest failures are composer repair convergence and latency: missing phrase/order bindings, two trial wall-clock timeouts, one bounded synthesis failure, and one calibration_inconclusive rejection."
        - "The repair-only data boundary fired as designed and prevented target switching after contract-only feedback, but Kimi still repeated insufficient answer_contract repairs."
        - "One accepted task was committed, but it is only ACCEPTED_BORDERLINE and the loop missed target 3 within 900 productive seconds."
        - "There were no provider issue trials; this should not be classified as provider outage, rate limit, or authentication failure."
      decision: "Do not promote N0002; Kimi submit transport is fixed enough to reach one accepted sample, but harvest remains production-viability failed."
      promotion_ready: false
    branching_notes:
      continue_from_here:
        - "Improve Kimi answer_contract planning for order_bindings and exact natural request phrases, or move contract repair into a smaller deterministic adapter that remains DB-agnostic."
        - "Reduce Kimi repair-loop latency before another production-viability harvest; max_generation_attempts=3 bounds failures but does not make the loop productive."
        - "Run a follow-up node against the same target-3 harvest protocol after contract convergence changes, then require independent DQS evaluation only if it becomes a promotion candidate."
      avoid:
        - "Do not treat the one accepted borderline task as production success."
        - "Do not classify the harvest failure as provider outage or rate limit; provider_issue_trials=0."
        - "Do not promote without a later harvest that reaches accepted 3 and an independent DQS report."
