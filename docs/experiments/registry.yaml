schema_version: 1

current_baseline: B0001
current_baseline_ref: baseline/current
current_phase_target: v1

architecture_policy:
  mutable_components:
    - specs
    - runtime_contracts
    - composer
    - solver
    - tools
    - prompts
    - pipeline
    - sdk_agent_topology
  sdk_agents:
    count: unconstrained
    types: unconstrained
    context_sharing: experiment_variable
  llm_judges_and_validators:
    allowed: true
    requirements:
      - record_model_prompt_version_context_scope_and_decision_authority
      - distinguish_semantic_quality_signal_from_precision_100_structural_reject
      - do_not_tune_to_known_benchmark_literals_or_failed_draft_tokens

evaluation_policies:
  - id: DQS-v1
    rubric: docs/experiments/rubric_dqs_v1.md
    hard_gates:
      accepted_low_quality: 0
      no_db_literal_or_token_heuristic: true
      precision_100_rejectors_only: true
      no_severe_mode_collapse: true
      no_source_of_truth_duplication: true
      db_readiness_not_forced: true
      independent_dqs_report_required: true
      evaluation_policy_changes_recorded: true
      llm_judge_components_versioned: true
      llm_semantic_not_structural_reject: true
    production_viability:
      trial_timeout_s: 300
      accepted_sample_count: 3
      productive_budget_seconds: 900
      fail_if_three_accepts_not_reached_within_budget: true
      productive_seconds_per_accepted_max: 300
      exclude_one_time_db_startup_and_warmup: true
      exclude_provider_issue_trials_from_average: true
      report_elapsed_seconds_for_all_trials: true
    db_set:
      - mimiciv_demo
      - postgres_air
      - pagila
    notes: >
      DQS is a quantitative rollup of qualitative rubric labels. Promotion
      also requires hard gates and adversarial review.

evaluation_protocols:
  - id: independent-dqs-v1
    protocol: docs/experiments/evaluator_subagent.md
    required_for:
      - candidate
      - frontier
      - promoted
    report_dir: docs/experiments/evaluations
    notes: >
      Builder self-evaluation is not sufficient for promotion. Use a blind-ish
      evaluator subagent when the user has authorized subagent evaluation.

nodes:
  - id: B0000
    type: baseline
    branch: main
    commit: "d5784a1"
    parent: null
    parent_commit: null
    status: promoted
    phase_target: v1
    hypothesis: >
      Main through d5784a1 is the root baseline for the next experiment graph.
    metadata_note: >
      Node commit is the artifact snapshot. Registry commits that record or
      revise node metadata may be descendants of the artifact snapshot.
    architecture_summary: >
      Existing synthesis pipeline after composer prompt, submit_draft validation,
      entity_json contract, KISS prompt plumbing cleanup, trial wall-clock budget,
      and accepted-3-within-900s production viability gate.
    fixed_principles:
      - no_evaluation_hacking
      - db_generalizable_generation
      - no_db_specific_literal_or_token_heuristics
      - precision_100_rejectors_only
      - source_of_truth_separation
      - low_quality_accepted_hard_failure
      - diversity_required
      - diagnose_bad_db_regions
    evaluation_policy: DQS-v1
    evaluation_protocol: independent-dqs-v1
    agent_topology:
      builder_agents: "existing pipeline baseline"
      evaluator_agents: "independent-dqs-v1 subagent for promotion candidates"
      context_policy: "builder/evaluator context separated by default"
      llm_judges: []
    quality_eval: null
    branching_notes:
      continue_from_here:
        - "Create architecture experiment nodes without preserving current composer/solver structure by default."
        - "Prefer thin slices for label-first, verifier-first, or DB readiness gates."
      avoid:
        - "Do not encode benchmark DB literals or known failed draft strings."
        - "Do not promote on accept count without DQS-v1 qualitative review."
  - id: B0001
    type: baseline
    branch: main
    commit: "baseline/current"
    artifact_commit: "f0a965e"
    parent: B0000
    parent_commit: "d5784a1"
    status: current
    phase_target: v1
    hypothesis: >
      Current main is the baseline for the next improvement graph after
      production viability gating, lightweight trial artifacts, unified
      analysis logs, and proof smoke command cleanup.
    metadata_note: >
      Other AI agents should start new experiment branches from the
      `baseline/current` ref unless the user explicitly asks to branch from an
      older node. `artifact_commit` records the last code artifact snapshot
      before governance metadata commits; the moving ref avoids a
      self-referential commit-hash problem in this registry file.
    architecture_summary: >
      Trial commands are lightweight. `smoke-proof-task` is a developer wiring
      check, `run-real-db-trial` is a single-sample analysis microscope, and
      `harvest` is the default improvement experiment entrypoint. Trials write
      `analysis.jsonl` as the unified timeline and accepted serving bundles are
      produced only by explicit `export-bundle`.
    fixed_principles:
      - no_evaluation_hacking
      - db_generalizable_generation
      - no_db_specific_literal_or_token_heuristics
      - precision_100_rejectors_only
      - source_of_truth_separation
      - low_quality_accepted_hard_failure
      - diversity_required
      - diagnose_bad_db_regions
    evaluation_policy: DQS-v1
    evaluation_protocol: independent-dqs-v1
    agent_topology:
      builder_agents: "experiment variable"
      evaluator_agents: "independent-dqs-v1 subagent for promotion candidates"
      context_policy: "builder/evaluator context separated by default"
      llm_judges: []
    command_roles:
      smoke-proof-task: "plumbing smoke check only; not a quality metric"
      run-real-db-trial: "single trial microscope; inspect analysis.jsonl"
      harvest: "default improvement experiment and production viability entrypoint"
      export-bundle: "post-accept registry materialization only"
    verification_wording:
      preflight_only:
        - smoke-proof-task
        - run-real-db-trial
      improvement_verification_requires:
        - harvest
        - DQS-v1 qualitative review
      forbidden_summary: "Do not claim an improvement was verified by smoke and real-db trial alone."
    quality_eval: null
    branching_notes:
      continue_from_here:
        - "Use harvest target 3 with DQS-v1 qualitative review for improvement comparisons."
        - "Use run-real-db-trial only for diagnosis before aggregate harvest evaluation."
      avoid:
        - "Do not use smoke-proof-task as a quality signal."
        - "Do not promote on accept count without DQS-v1 qualitative review."
  - id: N0002
    type: experiment
    branch: exp/N0002-kimi-submit-normalization
    commit: "6a13a90"
    parent: B0001
    parent_commit: "b3aa244"
    status: production_viability_failed
    phase_target: v1
    hypothesis: >
      If Kimi returns malformed standard tool-call arguments while also
      exposing its native tool-call template in reasoning/content, replacing
      only invalid standard calls with parsed same-tool native-template calls
      and accepting provider-compatible structured submit payloads should
      reduce submit_draft transport failures without changing task quality
      policy.
    metadata_note: >
      This node is a provider/tool compatibility sibling of N0001, branched
      from main at b3aa244 to isolate Kimi submit/tool-output stability from
      N0001's final-label diagnostics quality hypothesis.
    architecture_summary: >
      Extend the OpenAI-compatible SDK response normalization layer for Kimi
      and the submit_draft boundary. Native Kimi tool-call templates are parsed
      from reasoning/content when the provider-standard call is malformed.
      submit_draft also accepts direct JSON object/array payloads for label and
      entity, recovers provider-tailed submit input at the FunctionTool
      boundary, normalizes common answer_contract aliases, and blocks data-tool
      exploration after repair-only feedback.
    change_summary:
      - "Kimi response normalization now repairs invalid same-tool standard tool_calls from native template text instead of skipping parsing whenever tool_calls is present."
      - "Kimi native template parser now tolerates unescaped control characters inside JSON strings by escaping them before JSON decoding."
      - "Existing valid standard tool_calls remain authoritative and are not replaced by native-template parses."
      - "submit_draft recovers provider-tailed submit input at the FunctionTool boundary before rejecting malformed transport payloads."
      - "submit_draft label_json/entity_json now prefer direct JSON object/array values while preserving JSON-string compatibility."
      - "answer_contract accepts output/phrase aliases, mapping-style bindings, and order_by_phrase inference when structurally unambiguous."
      - "List answer_phrase exact-substring enforcement is relaxed only when output_bindings exactly cover every returned field."
      - "Repair-only feedback now blocks further data-tool exploration unless a label change is explicitly required."
      - "Permuted list labels are normalized to the latest successful query row order only when the submitted rows are the same multiset."
      - "Kimi harvest profile uses max_generation_attempts=3, solver_batch_size=8, and max_solver_runs=8 to bound repair loops."
    principles_touched:
      - source_of_truth_separation
      - db_generalizable_generation
      - no_db_specific_literal_or_token_heuristics
      - provider_compatibility
      - precision_100_structural_rejectors
      - quality_over_yield
    evaluation_policy: DQS-v1
    evaluation_protocol: "harvest target 3 + DQS-v1 qualitative review; independent-dqs-v1 required only for promotion"
    agent_topology:
      builder_agents: "single Codex coding agent modifying shared SDK provider normalization and submit_draft runtime"
      evaluator_agents: "none; local qualitative review only because this is not a promotion candidate"
      context_policy: "no subagents; no independent evaluator context used"
      llm_judges: []
    quality_eval:
      status: production_viability_failed
      tests:
        - command: "uv run pytest -q tests/test_sdk_helpers.py tests/test_tool_choice_for_model.py tests/test_reasoning_replay_hook.py"
          result: "passed: 27 tests"
        - command: "uv run ruff check src/rl_task_foundry/infra/sdk_helpers.py tests/test_sdk_helpers.py"
          result: "passed"
        - command: "uv run pytest -q tests/test_synthesis_backend_openai_agents.py tests/test_synthesis_runtime.py::test_submit_draft_tool_rejects_malformed_tool_input_without_crashing"
          result: "passed: 12 tests"
        - command: "uv run pytest -q tests/test_sdk_helpers.py tests/test_tool_choice_for_model.py tests/test_reasoning_replay_hook.py tests/test_synthesis_backend_openai_agents.py tests/test_synthesis_runtime.py tests/test_synthesis_prompts.py tests/test_turn_budget_prompt.py tests/test_config_load.py tests/test_pipeline_solver_orchestrator.py tests/test_cli_commands.py::test_cli_validate_config_command"
          result: "passed: 166 tests"
        - command: "uv run ruff check src/rl_task_foundry/synthesis/submit_draft_tool.py src/rl_task_foundry/synthesis/prompts.py src/rl_task_foundry/synthesis/turn_budget.py tests/test_synthesis_runtime.py tests/test_synthesis_prompts.py tests/test_turn_budget_prompt.py tests/test_config_load.py tests/test_cli_commands.py"
          result: "passed"
      preflight:
        - command: "uv run rl-task-foundry smoke-proof-task artifacts/experiments/N0002/smoke/kimi_submit_normalization"
          role: "plumbing smoke only; not a quality metric"
          result: "quality_gate_status=accept; solver_pass_rate=0.5; solver_matched_runs=3/6; elapsed_seconds=0.331; registry_status=duplicate"
        - command: "uv run rl-task-foundry smoke-proof-task artifacts/experiments/N0002/smoke/repair_boundary_list_phrase_row_order"
          role: "plumbing smoke only; not a quality metric"
          result: "quality_gate_status=accept; solver_pass_rate=0.5; solver_matched_runs=3/6; elapsed_seconds=0.326; registry_status=duplicate"
      diagnostic_trials:
        - command: "uv run rl-task-foundry run-real-db-trial pagila artifacts/experiments/N0002/diagnostic/pagila_trial_001"
          artifact: "artifacts/experiments/N0002/diagnostic/pagila_trial_001/debug/analysis.jsonl"
          status: "synthesis_failed"
          elapsed_seconds: 300.004
          error_codes:
            - trial_wall_clock_timeout
          submit_payload_invalid: 0
          submit_feedback_events: 1
          submit_rejections:
            calibration_inconclusive: 1
          solver_evidence: "second submitted draft reached pass_rate=1.0 with 20/20 matched solver runs before being rejected as calibration_inconclusive"
          decision_use: "diagnostic only; not an aggregate quality metric"
        - command: "uv run rl-task-foundry run-real-db-trial pagila artifacts/experiments/N0002/trials/pagila_trial_006_repair_boundary_list_phrase_row_order"
          artifact: "artifacts/experiments/N0002/trials/pagila_trial_006_repair_boundary_list_phrase_row_order/debug/analysis.jsonl"
          status: "trial_wall_clock_timeout"
          elapsed_seconds: 300.0
          observation: "repair_only_feedback blocked data-tool exploration after phrase/binding feedback, but Kimi still failed to add the required order binding before timeout."
