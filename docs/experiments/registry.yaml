schema_version: 1

current_baseline: B0001
current_baseline_ref: baseline/current
current_phase_target: v1

architecture_policy:
  mutable_components:
    - specs
    - runtime_contracts
    - composer
    - solver
    - tools
    - prompts
    - pipeline
    - sdk_agent_topology
  sdk_agents:
    count: unconstrained
    types: unconstrained
    context_sharing: experiment_variable
  llm_judges_and_validators:
    allowed: true
    requirements:
      - record_model_prompt_version_context_scope_and_decision_authority
      - distinguish_semantic_quality_signal_from_precision_100_structural_reject
      - do_not_tune_to_known_benchmark_literals_or_failed_draft_tokens

evaluation_policies:
  - id: DQS-v1
    rubric: docs/experiments/rubric_dqs_v1.md
    hard_gates:
      accepted_low_quality: 0
      no_db_literal_or_token_heuristic: true
      precision_100_rejectors_only: true
      no_severe_mode_collapse: true
      no_source_of_truth_duplication: true
      db_readiness_not_forced: true
      independent_dqs_report_required: true
      evaluation_policy_changes_recorded: true
      llm_judge_components_versioned: true
      llm_semantic_not_structural_reject: true
    production_viability:
      trial_timeout_s: 300
      accepted_sample_count: 3
      productive_budget_seconds: 900
      fail_if_three_accepts_not_reached_within_budget: true
      productive_seconds_per_accepted_max: 300
      exclude_one_time_db_startup_and_warmup: true
      exclude_provider_issue_trials_from_average: true
      report_elapsed_seconds_for_all_trials: true
    db_set:
      - mimiciv_demo
      - postgres_air
      - pagila
    notes: >
      DQS is a quantitative rollup of qualitative rubric labels. Promotion
      also requires hard gates and adversarial review.

evaluation_protocols:
  - id: independent-dqs-v1
    protocol: docs/experiments/evaluator_subagent.md
    required_for:
      - candidate
      - frontier
      - promoted
    report_dir: docs/experiments/evaluations
    notes: >
      Builder self-evaluation is not sufficient for promotion. Use a blind-ish
      evaluator subagent when the user has authorized subagent evaluation.

nodes:
  - id: B0000
    type: baseline
    branch: main
    commit: "d5784a1"
    parent: null
    parent_commit: null
    status: promoted
    phase_target: v1
    hypothesis: >
      Main through d5784a1 is the root baseline for the next experiment graph.
    metadata_note: >
      Node commit is the artifact snapshot. Registry commits that record or
      revise node metadata may be descendants of the artifact snapshot.
    architecture_summary: >
      Existing synthesis pipeline after composer prompt, submit_draft validation,
      entity_json contract, KISS prompt plumbing cleanup, trial wall-clock budget,
      and accepted-3-within-900s production viability gate.
    fixed_principles:
      - no_evaluation_hacking
      - db_generalizable_generation
      - no_db_specific_literal_or_token_heuristics
      - precision_100_rejectors_only
      - source_of_truth_separation
      - low_quality_accepted_hard_failure
      - diversity_required
      - diagnose_bad_db_regions
    evaluation_policy: DQS-v1
    evaluation_protocol: independent-dqs-v1
    agent_topology:
      builder_agents: "existing pipeline baseline"
      evaluator_agents: "independent-dqs-v1 subagent for promotion candidates"
      context_policy: "builder/evaluator context separated by default"
      llm_judges: []
    quality_eval: null
    branching_notes:
      continue_from_here:
        - "Create architecture experiment nodes without preserving current composer/solver structure by default."
        - "Prefer thin slices for label-first, verifier-first, or DB readiness gates."
      avoid:
        - "Do not encode benchmark DB literals or known failed draft strings."
        - "Do not promote on accept count without DQS-v1 qualitative review."
  - id: B0001
    type: baseline
    branch: main
    commit: "baseline/current"
    artifact_commit: "f0a965e"
    parent: B0000
    parent_commit: "d5784a1"
    status: current
    phase_target: v1
    hypothesis: >
      Current main is the baseline for the next improvement graph after
      production viability gating, lightweight trial artifacts, unified
      analysis logs, and proof smoke command cleanup.
    metadata_note: >
      Other AI agents should start new experiment branches from the
      `baseline/current` ref unless the user explicitly asks to branch from an
      older node. `artifact_commit` records the last code artifact snapshot
      before governance metadata commits; the moving ref avoids a
      self-referential commit-hash problem in this registry file.
    architecture_summary: >
      Trial commands are lightweight. `smoke-proof-task` is a developer wiring
      check, `run-real-db-trial` is a single-sample analysis microscope, and
      `harvest` is the default improvement experiment entrypoint. Trials write
      `analysis.jsonl` as the unified timeline and accepted serving bundles are
      produced only by explicit `export-bundle`.
    fixed_principles:
      - no_evaluation_hacking
      - db_generalizable_generation
      - no_db_specific_literal_or_token_heuristics
      - precision_100_rejectors_only
      - source_of_truth_separation
      - low_quality_accepted_hard_failure
      - diversity_required
      - diagnose_bad_db_regions
    evaluation_policy: DQS-v1
    evaluation_protocol: independent-dqs-v1
    agent_topology:
      builder_agents: "experiment variable"
      evaluator_agents: "independent-dqs-v1 subagent for promotion candidates"
      context_policy: "builder/evaluator context separated by default"
      llm_judges: []
    command_roles:
      smoke-proof-task: "plumbing smoke check only; not a quality metric"
      run-real-db-trial: "single trial microscope; inspect analysis.jsonl"
      harvest: "default improvement experiment and production viability entrypoint"
      export-bundle: "post-accept registry materialization only"
    verification_wording:
      preflight_only:
        - smoke-proof-task
        - run-real-db-trial
      improvement_verification_requires:
        - harvest
        - DQS-v1 qualitative review
      forbidden_summary: "Do not claim an improvement was verified by smoke and real-db trial alone."
    quality_eval: null
    branching_notes:
      continue_from_here:
        - "Use harvest target 3 with DQS-v1 qualitative review for improvement comparisons."
        - "Use run-real-db-trial only for diagnosis before aggregate harvest evaluation."
      avoid:
        - "Do not use smoke-proof-task as a quality signal."
        - "Do not promote on accept count without DQS-v1 qualitative review."
  - id: N0001
    type: experiment
    branch: exp/N0001-structural-quality-round
    commit: "2d5aeac"
    parent: B0001
    parent_commit: "b3aa244"
    status: running
    phase_target: v1
    hypothesis: >
      If query results expose structurally proven final-label blockers before
      submit_draft, the composer should waste fewer attempts on blocked/internal
      labels, keyless exposed row values, duplicate answer projections, and
      unstable list evidence without adding a new hard rejector.
    metadata_note: >
      The Kimi reasoning tool-call compatibility fix was promoted separately to
      main at b3aa244 because it is shared provider infrastructure, not an
      N0001 quality result. N0001 starts from that baseline.
    architecture_summary: >
      Keep the existing composer/solver topology. Add advisory
      `submission_diagnostics` to the composer query tool using only metadata
      already returned by the query execution path. The diagnostics summarize
      structural blockers but do not reject drafts or change scoring.
    change_summary:
      - "query now reports non_user_visible_label_source for selected output fields that expose blocked/internal values."
      - "query now reports no_primary_key_label_source when exposed row values come from a source table without a primary key."
      - "query now lifts duplicate projected answer rows and unstable list-order diagnostics into submission_diagnostics."
      - "query tool schema/description tells the composer to inspect submission_diagnostics before submit_draft."
    principles_touched:
      - precision_100_rejectors_only
      - source_of_truth_separation
      - low_quality_accepted_hard_failure
      - db_generalizable_generation
    evaluation_policy: DQS-v1
    evaluation_protocol: independent-dqs-v1
    agent_topology:
      builder_agents: "single Codex coding agent modifying existing composer query/tool surface"
      evaluator_agents: "none yet; independent-dqs-v1 only required before candidate/frontier/promotion"
      context_policy: "no subagents; no independent evaluator context used in this node yet"
      llm_judges: []
    quality_eval:
      status: diagnostic_only
      tests:
        - "uv run pytest -q tests/test_tooling_composer_query.py tests/test_tooling_composer_tool_factory.py"
        - "uv run ruff check src/rl_task_foundry/tooling/composer/query.py src/rl_task_foundry/tooling/composer/tool_factory.py tests/test_tooling_composer_query.py tests/test_tooling_composer_tool_factory.py"
      trial_notes:
        - "Earlier diagnostic artifact artifacts/experiments/N0001/diagnostic/pagila_trial_004_kimi_normalized confirmed Kimi tool calls execute after the shared infra fix, but the trial hit trial_wall_clock_timeout at 300s."
        - "No harvest target-3 run or DQS-v1 qualitative review has been completed for this node."
      promotion_ready: false
    branching_notes:
      continue_from_here:
        - "Run one or two run-real-db-trial samples to inspect whether submission_diagnostics changes composer recovery behavior."
        - "Use harvest target 3 with productive budget 900s before claiming improvement."
      avoid:
        - "Do not treat submission_diagnostics as a hard rejector."
        - "Do not promote this node without independent DQS-v1 evaluator report."
